# Bloc obligatoire pour Nginx, même si vide
events {
    # Ici on peut configurer le nombre de connexions simultanées, etc.
}

http {
    # Définition d'un "upstream" : un cluster de serveurs vers lequel Nginx va rediriger le trafic
    upstream my_flask_cluster {
        # Docker DNS résout automatiquement le nom 'flask-app' vers toutes les instances en cours d'exécution
        # Port 5000 : port sur lequel Flask écoute à l'intérieur de son conteneur
        server flask-app:5000;
    }

    # Configuration d'un serveur HTTP
    server {
        listen 80;  # Écoute sur le port 80 (HTTP standard)

        # Configuration des routes
        location / {
            # Redirection de toutes les requêtes vers le cluster Flask défini ci-dessus
            proxy_pass http://my_flask_cluster;

            # Transmission des informations originales du client au serveur Flask
            proxy_set_header Host $host;          # Transmet le nom d'hôte demandé par le client
            proxy_set_header X-Real-IP $remote_addr; # Transmet l'adresse IP réelle du client
        }
    }
}